name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@master
        with:
          github_user_name: hashimhashmi02
          outputs: |
            dist/github-contribution-snake.svg
            dist/github-contribution-snake-dark.svg?palette=github-dark

      - name: Push changes
        uses: EndBug/add-and-commit@v9
        with:
          add: '["dist/github-contribution-snake.svg", "dist/github-contribution-snake-dark.svg"]'
          push: true
          new_branch: github-contribution-snake
